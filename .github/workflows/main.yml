name: Decompress ZIP

on:
  workflow_dispatch

jobs:
  decompress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Extract ZIP
        run: |
          if [ -f diprogra-github.zip ]; then
            unzip -o diprogra-github.zip
            echo "ZIP extracted successfully"
          else
            echo "diprogra-github.zip not found"
            exit 1
          fi
      
      - name: Flatten structure and delete source folder
        run: |
          if [ -d diprogra-java120426 ]; then
            mv diprogra-java120426/* ./
            rm -rf diprogra-java120426
            echo "Folder deleted successfully"
          fi
      
      - name: Git configuration and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin main
          git reset --hard origin/main
          git add -A
          if git diff --cached --exit-code > /dev/null; then
            echo "No changes to commit"
          else
            git commit -m "Extract diprogra-github.zip to root"
            git push origin HEAD:main
          fi
