name: Decompress ZIP

on:
  workflow_dispatch

jobs:
  decompress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          if [ -f diprogra-github.zip ]; then
            unzip -o diprogra-github.zip
            echo "ZIP extracted successfully"
          else
            echo "diprogra-github.zip not found"
            exit 1
          fi
      
      - name: Flatten structure and delete source folder
        run: |
          if [ -d diprogra-java120426 ]; then
            # Mover contenidos a la raíz
            mv diprogra-java120426/* ./
            # Borrar la carpeta vacía
            rm -rf diprogra-java120426
            echo "Folder deleted successfully"
          fi
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git status
          git commit -m "Extract and clean diprogra-github.zip contents" || echo "No changes to commit"
          git push origin main
