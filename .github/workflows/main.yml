name: Decompress ZIP

on:
  workflow_dispatch

jobs:
  decompress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check if ZIP exists
        run: |
          ls -lah diprogra-github.zip || exit 1
      
      - name: Extract ZIP
        run: |
          unzip -o diprogra-github.zip -d temp_extract/
          echo "ZIP extracted to temp_extract"
      
      - name: Move files to root and cleanup
        run: |
          cd temp_extract
          if [ -d diprogra-java120426 ]; then
            # Mover archivos
            mv diprogra-java120426/* ../
            cd ..
            rm -rf temp_extract
            echo "Files moved and temp folder deleted"
          else
            echo "diprogra-java120426 not found"
            exit 1
          fi
      
      - name: List files to verify
        run: |
          echo "Current directory structure:"
          ls -la
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Extract diprogra-github.zip to root" || echo "No changes to commit"
          git push origin main
