# ═══════════════════════════════════════════════
#  DIPROGRA v2.1 — Configuración de la aplicación
# ═══════════════════════════════════════════════

# ── Servidor ──────────────────────────────────
server.port=${PORT:8080}

# ── PostgreSQL ────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/diprogra}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── Inicialización de BD ──────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8

# ── Thymeleaf ─────────────────────────────────
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── Subida de archivos ────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Sesión ────────────────────────────────────
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true

# ── Rutas de datos ────────────────────────────
diprogra.uploads-dir=${DIPROGRA_UPLOADS_DIR:./datos-diprogra/imagenes}
diprogra.backups-dir=${DIPROGRA_BACKUPS_DIR:./datos-diprogra/respaldos}

# ── Jackson JSON ──────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
